name: SparkJobs Scanner

on:
  schedule:
    - cron: '0 */6 * * *' # Runs 4x/day (within GitHub Actions free tier budget)
  workflow_dispatch: # Allows manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    concurrency:
      group: sparkjobs-scan-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write # Crucial permission to commit seen_jobs.json back to repo
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Job Scanner
        run: |
          cd src
          python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPARKJOBS_PING_SECRET: ${{ secrets.SPARKJOBS_PING_SECRET }}

      - name: Commit and Push bot state back to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          for file in data/seen_jobs.json data/status_tracker.json data/jobs_history.json; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done
          if ! git diff --staged --quiet; then
            git commit -m "update: bot state $(date +'%Y-%m-%d %H:%M')"
            for i in 1 2 3; do
              git pull --rebase origin ${GITHUB_REF_NAME:-master} && git push origin HEAD:${GITHUB_REF_NAME:-master} && break || sleep 2
            done
          fi
